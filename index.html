<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0010" />
  <title>Happy Birthday, Nicca! 🎂</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Lato:wght@300;400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ===== INTRO SCREEN ===== -->
  <section id="intro" class="intro-screen">
    <div class="hearts-bg" id="hearts-intro"></div>
    <div class="intro-content">
      <span class="cake-emoji">🎂</span>
      <p class="intro-label">Today is your day</p>
      <h1 class="intro-title">Happy Birthday</h1>
      <h2 class="intro-name">Nicca</h2>
      <p class="intro-age">✦ 32 years of pure magic ✦</p>
      <p class="intro-hint">Scroll down to relive our story</p>
      <div class="scroll-arrow">↓</div>
    </div>
  </section>

  <!-- ===== GALLERY (built by JS) ===== -->
  <main id="gallery"></main>

  <!-- ===== OUTRO SCREEN ===== -->
  <section id="outro" class="outro-screen">
    <div class="hearts-bg" id="hearts-outro"></div>
    <div class="outro-content">
      <span class="outro-icon">💍</span>
      <blockquote class="outro-quote">
        You are my today and all of my tomorrows.
      </blockquote>
      <h2 class="outro-title">Happy 32nd Birthday,<br>my love</h2>
      <p class="outro-sub">With all my heart, always ❤️</p>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
